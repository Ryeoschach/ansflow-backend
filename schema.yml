            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPolicy'
          description: ''
    patch:
      operationId: v1_approval_policies_partial_update
      description: |-
        配置中心的审批阻断策略开关

        > **[RBAC 权限]**: 需拥有 `system:approval_policy:edit` (或对应继承/通配符权限) 才能访问。
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 审批策略 的 唯一整数值。
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApprovalPolicy'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApprovalPolicy'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApprovalPolicy'
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPolicy'
          description: ''
    delete:
      operationId: v1_approval_policies_destroy
      description: |-
        配置中心的审批阻断策略开关

        > **[RBAC 权限]**: 需拥有 `system:approval_policy:delete` (或对应继承/通配符权限) 才能访问。
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 审批策略 的 唯一整数值。
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/approval_tickets/:
    get:
      operationId: v1_approval_tickets_list
      description: |-
        审批总控台: 这里只允许列表查看，拦截通过/拒绝通过特有接口操作

        > **[RBAC 权限]**: 需拥有 `system:approval_ticket:view` (或对应继承/通配符权限) 才能访问。
      parameters:
      - name: ordering
        required: false
        in: query
        description: 用于排序结果的字段。
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: 每页返回的结果数量。
        schema:
          type: integer
      - in: query
        name: resource_type
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: 搜索关键词。
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          title: 审批状态
          enum:
          - approved
          - canceled
          - failed
          - finished
          - pending
          - rejected
        description: |-
          * `pending` - 待审批
          * `approved` - 已批准 (后台发往引擎)
          * `rejected` - 已驳回
          * `canceled` - 发起人已撤销
          * `finished` - 已执行 (放行成功)
          * `failed` - 执行失败 (放行触发报错)
      - in: query
        name: submitter__username
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalTicketList'
          description: ''
