openapi: 3.0.3
info:
  title: AnsFlow 运维平台 API
  version: 1.0.0
  description: 基于 Django + DRF 的自动化运维平台后端接口文档
paths:
  /api/v1/account/me/:
    get:
      operationId: v1_account_me_retrieve
      description: |-
        用戶管理：

        > **[RBAC 权限]**: 需拥有 `rbac:user:me` (或对应继承/通配符权限) 才能访问。
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/account/menus/:
    get:
      operationId: v1_account_menus_retrieve
      description: |-
        菜单管理视图集：支持树形显示和标准管理

        > **[RBAC 权限]**: 需拥有 `rbac:menu:my_menus` (或对应继承/通配符权限) 才能访问。
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
          description: ''
  /api/v1/approval_policies/:
    get:
      operationId: v1_approval_policies_list
      description: |-
        配置中心的审批阻断策略开关

        > **[RBAC 权限]**: 需拥有 `system:approval_policy:view` (或对应继承/通配符权限) 才能访问。
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: 用于排序结果的字段。
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: 每页返回的结果数量。
        schema:
          type: integer
      - in: query
        name: resource_type
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: 搜索关键词。
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalPolicyList'
          description: ''
    post:
      operationId: v1_approval_policies_create
      description: |-
        配置中心的审批阻断策略开关

        > **[RBAC 权限]**: 需拥有 `system:approval_policy:add` (或对应继承/通配符权限) 才能访问。
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalPolicy'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalPolicy'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalPolicy'
        required: true
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPolicy'
          description: ''
  /api/v1/approval_policies/{id}/:
